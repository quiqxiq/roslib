services:
  influxdb3:
    image: quay.io/influxdb/influxdb3-core:latest
    container_name: roslib-influx
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3
      - --http-bind=0.0.0.0:8181
    ports:
      - "8181:8181"
    volumes:
      - influx_data:/var/lib/influxdb3
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8181/health"]
      interval: 3s
      timeout: 2s
      retries: 20

volumes:
  influx_data:
